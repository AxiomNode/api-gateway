services:
  api-gateway:
    image: "api_gateway_${DISTRIBUTION:-dev}_${RELEASE_VERSION:-v1}"
    container_name: "api_gateway_${DISTRIBUTION:-dev}_${RELEASE_VERSION:-v1}"
    restart: unless-stopped
    build:
      context: ./src
      dockerfile: Dockerfile
    env_file:
      - ./src/.env
      - ./src/.env.secrets
    ports:
      - "7005:7005"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7005/health || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    mem_limit: 256m
    mem_reservation: 128m
    cpus: "0.5"
